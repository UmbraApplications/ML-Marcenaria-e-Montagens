<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Orçamento Marcenaria</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="img/umbraLogo.png" class="logo-topo">
    <div class="container">
        <img src="img/logoMarcenaria.jpg" class="logo">
        <h1>Orçamento Marcenaria</h1>

        <input type="text" id="cliente" placeholder="Nome do cliente">

        <div id="materiais">

            <script>
                const materiaisPadrao = [
                    "Chapa de MDF Br TX 15mm",
                    "Chapa de MDF Br TX 6mm",
                    "Chapa de MDF 18mm",
                    "Caixa de parafuso",
                    "Corrediça",
                    "Puxador",
                    "Dobradiça",
                    "Fita de borda",
                    "Lata de cola",
                    "Cola da coladeira",
                    "Cantoneira de fixação",
                    "Cadeirinha"
                ];

                document.write(materiaisPadrao.map(nome => `
                <div class="item">
                    <input value="${nome}" class="nome">

                    <div class="linha">
                        <input type="number" min="0" step="1" placeholder="Qtd" class="qtd" oninput="atualizarSubtotal(this)">
                        <input type="number" min="0" step="0.01" placeholder="Preço" class="preco" oninput="atualizarSubtotal(this)">
                    </div>

                    <span class="subtotal">R$ 0.00</span>

                    <button class="remover" onclick="remover(this)">Remover</button>
                </div>
                `).join(""));
            </script>

        </div>

        <button class="add" onclick="addMaterial()">+ Adicionar Material</button>

        <label>Mão de obra:</label>
        <input type="number" id="maoObra" min="0" step="0.01" placeholder="R$">

        <button onclick="calcular()">Calcular</button>

        <h2 id="total"></h2>

        <button onclick="baixar()">📥 Baixar Orçamento</button>
        <div class="assinatura">
            <img src="img/umbraLogo.png" class="logo-dev">
            <span>Desenvolvido por Umbra</span>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
